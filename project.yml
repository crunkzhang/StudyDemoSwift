name: WeChatSwift
options:
  bundleIdPrefix: com.study
  deploymentTarget:
    iOS: "15.1"
  developmentLanguage: zh-Hans

# 文件分组配置 - 在 Xcode 中按层次显示
fileGroups:
  - Modules/WeChatKit
  - Modules/Business
  - WeChatSwift

# ========== 项目基础组件层（微信特有）==========
# 注意：ExtensionKit 和 RouterKit 已作为独立的 CocoaPods 二方库
targets:
  # ========== 项目基础组件层（微信特有）==========
  WeChatUI:
    type: framework
    platform: iOS
    sources:
      - Modules/WeChatKit/WeChatUI
    dependencies:
      - framework: ExtensionKit
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.WeChatUI
      GENERATE_INFOPLIST_FILE: YES

  WeChatRouter:
    type: framework
    platform: iOS
    sources:
      - Modules/WeChatKit/WeChatRouter
    dependencies:
      - framework: RouterKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.WeChatRouter
      GENERATE_INFOPLIST_FILE: YES

  WeChatRN:
    type: framework
    platform: iOS
    sources:
      - Modules/WeChatKit/WeChatRN
    dependencies:
      - target: WeChatUI
      - framework: RouterKit
      - framework: React
      - framework: React_RCTAppDelegate
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.WeChatRN
      GENERATE_INFOPLIST_FILE: YES

  # ========== 业务模块层 ==========
  ChatModule:
    type: framework
    platform: iOS
    sources:
      - Modules/Business/ChatModule
    dependencies:
      - target: WeChatUI
      - target: WeChatRouter
      - target: WeChatRN
      - framework: RouterKit
      - framework: ExtensionKit
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.ChatModule
      GENERATE_INFOPLIST_FILE: YES

  ContactModule:
    type: framework
    platform: iOS
    sources:
      - Modules/Business/ContactModule
    dependencies:
      - target: WeChatUI
      - target: WeChatRouter
      - framework: RouterKit
      - framework: ExtensionKit
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.ContactModule
      GENERATE_INFOPLIST_FILE: YES

  DiscoverModule:
    type: framework
    platform: iOS
    sources:
      - Modules/Business/DiscoverModule
    dependencies:
      - target: WeChatUI
      - target: WeChatRouter
      - target: WeChatRN
      - framework: RouterKit
      - framework: ExtensionKit
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.DiscoverModule
      GENERATE_INFOPLIST_FILE: YES

  MeModule:
    type: framework
    platform: iOS
    sources:
      - Modules/Business/MeModule
    dependencies:
      - target: WeChatUI
      - target: WeChatRouter
      - framework: RouterKit
      - framework: ExtensionKit
      - framework: SnapKit
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.MeModule
      GENERATE_INFOPLIST_FILE: YES

  # ========== 主工程 ==========
  WeChatSwift:
    type: application
    platform: iOS
    sources:
      - WeChatSwift
    dependencies:
      - target: ChatModule
      - target: ContactModule
      - target: DiscoverModule
      - target: MeModule
      - target: WeChatRN
        embed: true
      - target: WeChatRouter
        embed: true
      - target: WeChatUI
        embed: true
      # ExtensionKit 和 RouterKit 通过 CocoaPods 引入，不需要手动 embed
    info:
      path: WeChatSwift/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_CN
        CFBundleDisplayName: 微信
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Light
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.study.WeChatSwift
      SWIFT_VERSION: "5.0"
      TARGETED_DEVICE_FAMILY: "1"
      INFOPLIST_FILE: WeChatSwift/Info.plist
